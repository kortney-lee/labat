name: Vowels CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "vowels/**"
      - "firebase.vowels.json"
      - ".github/workflows/vowels-ci.yml"
  pull_request:
    paths:
      - "vowels/**"
      - ".github/workflows/vowels-ci.yml"
  workflow_dispatch:

concurrency:
  group: vowels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: vowels

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: vowels

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_WIHY_AI_SA_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.12.0

      - name: Enable Firebase webframeworks experiment
        working-directory: .
        run: firebase experiments:enable webframeworks

      - name: Deploy to Firebase Hosting (vowels)
        working-directory: .
        run: firebase deploy --only hosting:vowels --project wihy-ai --config firebase.vowels.json

      - name: Smoke test live endpoints
        working-directory: .
        run: |
          curl -fsSL "https://vowels-org.web.app" > /dev/null
          curl -fsSL "https://vowels-org.web.app/sitemap.xml" > /dev/null
          curl -fsSL "https://vowels-org.web.app/robots.txt" > /dev/null
          curl -fsSL "https://vowels-org.web.app/rss.xml" > /dev/null
          curl -fsSL "https://vowels-org.web.app/feed" > /dev/null
          curl -fsSL "https://vowels-org.web.app/news-sitemap.xml" > /dev/null

      - name: Resolve Alex (SEO) service URL
        id: alex
        working-directory: .
        run: |
          ALEX_URL=$(gcloud run services describe wihy-alex-vowels --region us-central1 --project wihy-ai --format='value(status.url)')
          echo "url=$ALEX_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved Alex URL: $ALEX_URL"

      - name: Alex SEO health check
        working-directory: .
        run: curl -fsSL "${{ steps.alex.outputs.url }}/api/astra/health" > /dev/null

      - name: Trigger Alex SEO cycles
        if: ${{ secrets.INTERNAL_ADMIN_TOKEN != '' }}
        working-directory: .
        env:
          INTERNAL_ADMIN_TOKEN: ${{ secrets.INTERNAL_ADMIN_TOKEN }}
        run: |
          curl -fsSL -X POST "${{ steps.alex.outputs.url }}/api/astra/trigger/all" \
            -H "x-admin-token: ${INTERNAL_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" > /dev/null

      - name: Skip Alex trigger (no token configured)
        if: ${{ secrets.INTERNAL_ADMIN_TOKEN == '' }}
        run: echo "INTERNAL_ADMIN_TOKEN secret is not configured; skipping Alex /trigger/all"

      - name: Fetch Alex SEO report
        if: ${{ secrets.INTERNAL_ADMIN_TOKEN != '' }}
        working-directory: .
        env:
          INTERNAL_ADMIN_TOKEN: ${{ secrets.INTERNAL_ADMIN_TOKEN }}
        run: |
          mkdir -p .artifacts
          curl -fsSL "${{ steps.alex.outputs.url }}/api/astra/report" \
            -H "x-admin-token: ${INTERNAL_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -o .artifacts/alex-report.json

      - name: Upload Alex report artifact
        if: ${{ secrets.INTERNAL_ADMIN_TOKEN != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: alex-seo-report
          path: .artifacts/alex-report.json
          if-no-files-found: error

      - name: Publish Alex report summary
        if: ${{ secrets.INTERNAL_ADMIN_TOKEN != '' }}
        working-directory: .
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path('.artifacts/alex-report.json')
          report = json.loads(report_path.read_text(encoding='utf-8'))

          lines = [
              '## Alex SEO Report',
              f"- Agent: {report.get('agent', 'alex')}",
              f"- Generated at: {report.get('generated_at', report.get('timestamp', 'n/a'))}",
          ]

          keys = report.get('keywords', {})
          pages = report.get('pages', {})
          opportunities = report.get('opportunities', {})

          if isinstance(keys, dict):
              lines.append(f"- Keywords discovered/saved: {keys.get('discovered', 'n/a')}/{keys.get('saved', 'n/a')}")
          if isinstance(pages, dict):
              lines.append(f"- Pages generated/refreshed: {pages.get('generated', 'n/a')}/{pages.get('refreshed', 'n/a')}")
          if isinstance(opportunities, dict):
              lines.append(f"- Opportunities found/saved: {opportunities.get('found', 'n/a')}/{opportunities.get('saved', 'n/a')}")

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as fh:
              fh.write('\n'.join(lines) + '\n')
          PY
