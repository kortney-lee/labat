# Cloud Build — WIHY LABAT Service: Vowels (Trinity) brand instance
# Deploys wihy-labat-vowels — scoped to the vowels brand only.
# Usage: gcloud builds submit --config cloudbuild.labat-vowels.yaml

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'us-central1-docker.pkg.dev/wihy-ai/wihy-repo/wihy-labat-vowels:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    timeout: 1200s

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/wihy-ai/wihy-repo/wihy-labat-vowels:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wihy-labat-vowels'
      - '--image'
      - 'us-central1-docker.pkg.dev/wihy-ai/wihy-repo/wihy-labat-vowels:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--timeout'
      - '120'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '40'
      - '--set-env-vars'
      - 'APP_MODULE=src.apps.labat_app:app,ENV=production,LOG_LEVEL=INFO,WIHY_ML_CLIENT_ID=wihy_ml_mk1waylw,SERVICES_URL=https://services.wihy.ai,META_AD_ACCOUNT_ID=act_218581359635343,META_BUSINESS_ID=4867231843349033,LINKEDIN_ORG_ID=111401973,LABAT_BRAND_SCOPE=vowels,LABAT_AD_BRANDS=vowels,BRAND_ENFORCEMENT_MODE=warn'
      - '--set-secrets'
      - >-
        INTERNAL_ADMIN_TOKEN=internal-admin-token:latest,
        GEMINI_API_KEY=GOOGLE_API_KEY:latest,
        OPENAI_API_KEY=openai-api-key:latest,
        WIHY_ML_CLIENT_SECRET=wihy-ml-client-secret:latest,
        OAUTH_FRONTEND_CLIENT_SECRET=OAUTH_FRONTEND_CLIENT_SECRET:latest,
        LINKEDIN_ACCESS_TOKEN=linkedin-access-token:latest,
        SHANIA_APP_ID=wihy-shania-app-id:latest,
        SHANIA_APP_SECRET=wihy-shania-app-secret:latest,
        SHANIA_PAGE_ACCESS_TOKEN=wihy-shania-page-access-token:latest,
        SHANIA_LONG_LIVED_USER_TOKEN=wihy-shania-long-user-token:latest,
        META_APP_ID=wihy-agent-meta-app-id:latest,
        META_APP_SECRET=wihy-agent-meta-app-secret:latest,
        META_PAGE_ACCESS_TOKEN=wihy-agent-meta-page-access-token:latest,
        META_SYSTEM_USER_TOKEN=wihy-agent-meta-system-user-token:latest,
        META_WEBHOOK_VERIFY_TOKEN=wihy-agent-meta-webhook-verify-token:latest,
        META_PIXEL_ID=wihy-agent-meta-pixel-id:latest,
        SENDGRID_API_KEY=sendgrid-api-key:latest,
        META_PAGE_ID_WIHY=meta-page-id-wihy:latest,
        META_PAGE_ID_VOWELS=meta-page-id-vowels:latest,
        META_PAGE_ID_COMMUNITYGROCERIES=meta-page-id-communitygroceries:latest,
        META_PAGE_ID_CHILDRENNUTRITION=meta-page-id-childrennutrition:latest,
        META_PAGE_ID_PARENTINGWITHCHRIST=meta-page-id-parentingwithchrist:latest,
        META_PAGE_ID_OTAKULOUNGE=meta-page-id-otakulounge:latest
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'wihy-ml-backend@wihy-ai.iam.gserviceaccount.com'
    timeout: 600s

images:
  - 'us-central1-docker.pkg.dev/wihy-ai/wihy-repo/wihy-labat-vowels:latest'

timeout: 1800s

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
