<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    background: var(--bg1);
    padding: 64px;
  }

  /* Decorative leaf shapes */
  .leaf-1 {
    position: absolute;
    top: 40px; right: 48px;
    width: 60px; height: 90px;
    border-radius: 0 60px 0 60px;
    background: var(--accent);
    opacity: 0.08;
    transform: rotate(20deg);
    pointer-events: none;
  }
  .leaf-2 {
    position: absolute;
    bottom: 100px; left: 48px;
    width: 40px; height: 60px;
    border-radius: 0 40px 0 40px;
    background: var(--accent2);
    opacity: 0.06;
    transform: rotate(-15deg);
    pointer-events: none;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 52px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.5px;
    max-width: 85%;
    margin-bottom: 16px;
  }

  .divider {
    width: 44px;
    height: 4px;
    background: var(--accent);
    margin-bottom: 16px;
    border-radius: 2px;
  }

  .subtext {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 85%;
    margin-bottom: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 12px 28px;
    border-radius: 24px;
    letter-spacing: 1px;
  }



  .footer {
    position: absolute;
    bottom: 28px;
    right: 64px;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="leaf-1"></div>
    <div class="leaf-2"></div>

    <h1 class="headline">{{headline}}</h1>
    <div class="divider"></div>
    {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
    {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}

    <div class="footer">
      {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
    </div>
  </div>
</body>
</html>
