<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg1);
  }

  /* Top half: photo */
  .photo-section {
    width: 100%;
    height: 55%;
    position: relative;
    overflow: hidden;
  }

  .photo-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('{{photoUrl}}');
    background-size: cover;
    background-position: center;
  }

  /* Gradient fade from photo into text area */
  .photo-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, transparent 0%, var(--bg1) 100%);
  }

  /* Logo on the photo */
  .logo {
    position: absolute;
    top: 24px;
    left: 24px;
    height: 44px;
    width: auto;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  /* Bottom half: text */
  .text-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 56px 48px;
    position: relative;
  }

  /* Left accent bar */
  .text-section::before {
    content: '';
    position: absolute;
    left: 32px;
    top: 20%;
    bottom: 20%;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.4;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 900;
    font-size: 40px;
    color: #f8fafc;
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  .subtext {
    font-size: 18px;
    font-weight: 400;
    color: rgba(248,250,252,0.5);
    line-height: 1.5;
    max-width: 90%;
    margin-bottom: 24px;
  }

  .cta-btn {
    display: inline-flex;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 14px;
    padding: 12px 32px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="photo-section">
      <div class="photo-bg"></div>
      <div class="photo-fade"></div>
      {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
    </div>

    <div class="text-section">
      <h1 class="headline">{{headline}}</h1>
      {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
      {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}
    </div>
  </div>
</body>
</html>
