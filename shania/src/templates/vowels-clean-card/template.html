<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    background: var(--bg1);
    padding: 64px;
  }

  /* Thin top accent bar */
  .accent-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--accent);
  }

  /* Subtle vertical line */
  .v-line {
    position: absolute;
    top: 40px; right: 56px;
    width: 2px; height: 120px;
    background: var(--accent);
    opacity: 0.12;
    pointer-events: none;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 52px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.5px;
    max-width: 85%;
    margin-bottom: 16px;
  }

  .rule {
    width: 44px;
    height: 3px;
    background: var(--accent);
    margin-bottom: 16px;
  }

  .subtext {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 85%;
    margin-bottom: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 12px 28px;
    border-radius: 6px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    right: 64px;
  }

  .logo {
    height: 80px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="v-line"></div>

    <h1 class="headline">{{headline}}</h1>
    <div class="rule"></div>
    {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
    {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}

    <div class="footer">
      {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
    </div>
  </div>
</body>
</html>
