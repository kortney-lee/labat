<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 64px 72px;
    position: relative;
    background: linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 100%);
    overflow: hidden;
  }

  /* Subtle side accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 5px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent) 0%, transparent 70%);
  }

  /* Corner glow */
  .glow {
    position: absolute;
    bottom: -100px; right: -100px;
    width: 450px; height: 450px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Dot grid decoration */
  .deco-dots {
    position: absolute;
    top: 64px; right: 64px;
    width: 80px; height: 80px;
    background-image: radial-gradient(circle, var(--accent) 1.5px, transparent 1.5px);
    background-size: 16px 16px;
    opacity: 0.12;
    pointer-events: none;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .tag {
    display: inline-block;
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    padding: 6px 16px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    opacity: 0.7;
  }

  .logo {
    height: 56px;
    width: auto;
    object-fit: contain;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 900;
    font-size: 46px;
    color: #f8fafc;
    line-height: 1.1;
    letter-spacing: -1px;
    max-width: 90%;
    margin-bottom: 24px;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: var(--accent);
    margin-bottom: 24px;
    border-radius: 2px;
  }

  .findings {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow: hidden;
    min-height: 0;
  }

  .finding {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .finding-marker {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 16px;
    color: var(--accent);
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--accent);
    border-radius: 6px;
    margin-top: 2px;
    opacity: 0.6;
  }

  .finding-text {
    font-size: 19px;
    font-weight: 500;
    color: rgba(248,250,252,0.65);
    line-height: 1.4;
    flex: 1;
  }

  .source-line {
    font-size: 13px;
    color: rgba(248,250,252,0.22);
    margin-top: 12px;
    font-style: italic;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 14px;
    padding: 12px 28px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: rgba(248,250,252,0.3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="deco-dots"></div>

    <div class="header">
      <div class="tag">Research Findings</div>
      {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
    </div>

    <h1 class="headline">{{headline}}</h1>
    <div class="divider"></div>

    <div class="findings">
      {{#each dataPoints}}
      <div class="finding">
        <div class="finding-marker">{{indexPlusOne}}</div>
        <div class="finding-text">{{this}}</div>
      </div>
      {{/each}}
    </div>

    {{#if source}}<div class="source-line">{{source}}</div>{{/if}}

    <div class="footer">
      {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}
      {{#if productName}}<span class="product-name">{{productName}}</span>{{/if}}
    </div>
  </div>
</body>
</html>
