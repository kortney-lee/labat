<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 56px 64px;
    position: relative;
    background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  /* Corner glow */
  .glow {
    position: absolute;
    top: -60px; left: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Decorative vertical accent stripe */
  .deco-stripe {
    position: absolute;
    top: 0; right: 40px;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, transparent 0%, var(--accent) 30%, var(--accent) 70%, transparent 100%);
    opacity: 0.08;
    pointer-events: none;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 900;
    font-size: 40px;
    color: #f8fafc;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .logo {
    height: 56px;
    width: auto;
    object-fit: contain;
  }

  .subtext-row {
    font-size: 16px;
    color: rgba(248,250,252,0.4);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .items {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
    min-height: 0;
  }

  .item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 20px;
    gap: 20px;
  }

  .item-score {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 20px;
    color: #f8fafc;
    flex-shrink: 0;
  }

  .score-good { background: #166534; }
  .score-mid  { background: #92400e; }
  .score-bad  { background: #991b1b; }

  .item-info { flex: 1; }

  .item-name {
    font-weight: 700;
    font-size: 20px;
    color: #f1f5f9;
  }

  .item-verdict {
    font-size: 14px;
    color: rgba(248,250,252,0.4);
    margin-top: 2px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .cta-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 24px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .product-name {
    font-size: 14px;
    font-weight: 500;
    color: rgba(248,250,252,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="deco-stripe"></div>

    <div class="header">
      <h1 class="headline">{{headline}}</h1>
      {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
    </div>

    {{#if subtext}}<p class="subtext-row">{{subtext}}</p>{{/if}}

    <div class="items">
      {{#each items}}
      <div class="item">
        <div class="item-score {{#if (gte score 70)}}score-good{{else}}{{#if (gte score 40)}}score-mid{{else}}score-bad{{/if}}{{/if}}">
          {{score}}
        </div>
        <div class="item-info">
          <div class="item-name">{{name}}</div>
          <div class="item-verdict">{{verdict}}</div>
        </div>
      </div>
      {{/each}}
    </div>

    <div class="footer">
      {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}
      {{#if productName}}<span class="product-name">{{productName}}</span>{{/if}}
    </div>
  </div>
</body>
</html>
