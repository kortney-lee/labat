<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
    --paper: rgba(255,255,255,0.76);
    --card-radius: 28px;
    --head-size: 48px;
    --badge-bg: rgba(255,255,255,0.62);
  }

  body[data-theme='bold'] {
    --head-size: 52px;
    --paper: rgba(255,255,255,0.66);
  }

  body[data-theme='dark'] {
    --paper: rgba(17,24,39,0.56);
    --badge-bg: rgba(17,24,39,0.52);
  }

  body[data-direction='poster'] {
    --card-radius: 14px;
  }

  body[data-direction='lifestyle'] {
    --card-radius: 34px;
  }

  .card {
    width: 100%;
    height: 100%;
    padding: 52px;
    position: relative;
    background:
      radial-gradient(circle at 10% 8%, rgba(255,255,255,0.54) 0%, transparent 40%),
      linear-gradient(155deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  .blob-a {
    position: absolute;
    width: 340px;
    height: 250px;
    left: -90px;
    top: -70px;
    border-radius: 58% 42% 51% 49% / 55% 62% 38% 45%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0.2;
  }

  .blob-b {
    position: absolute;
    width: 270px;
    height: 220px;
    right: -70px;
    bottom: -60px;
    border-radius: 44% 56% 58% 42% / 58% 48% 52% 42%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    opacity: 0.16;
  }

  .panel {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: var(--card-radius);
    background: var(--paper);
    border: 1px solid rgba(255,255,255,0.42);
    box-shadow: 0 28px 60px rgba(0,0,0,0.18);
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    overflow: hidden;
  }

  .left {
    padding: 44px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .community-tag {
    align-self: flex-start;
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--font-headline);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-primary);
    background: var(--badge-bg);
    border: 1px solid rgba(255,255,255,0.66);
  }

  .headline {
    font-family: var(--font-headline);
    font-size: var(--head-size);
    font-weight: 900;
    line-height: 1.06;
    letter-spacing: -0.9px;
    color: var(--text-primary);
    text-wrap: balance;
    margin: 16px 0;
  }

  .subtext {
    font-size: 20px;
    line-height: 1.5;
    color: var(--text-secondary);
    text-wrap: pretty;
    max-width: 94%;
  }

  .footer {
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    height: 72px;
    width: auto;
    object-fit: contain;
  }

  .right {
    position: relative;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.0)),
      linear-gradient(145deg, var(--accent), var(--accent2));
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 26px;
    color: #fff;
  }

  .quote-open {
    font-family: Georgia, serif;
    font-size: 82px;
    line-height: 0.7;
    opacity: 0.56;
  }

  .cta-btn {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
    background: #ffffff;
    color: #0f172a;
    font-family: var(--font-headline);
    font-size: 13px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    font-weight: 800;
    border-radius: 999px;
    padding: 12px 20px;
  }
</style>
</head>
<body data-theme="{{theme}}" data-direction="{{artDirection}}">
  <div class="card">
    <div class="blob-a"></div>
    <div class="blob-b"></div>
    <section class="panel">
      <div class="left">
        <span class="community-tag">Community Groceries</span>
        <div>
          <h1 class="headline">{{headline}}</h1>
          {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
        </div>
        <div class="footer">
          {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
        </div>
      </div>
      <aside class="right">
        <div class="quote-open">&ldquo;</div>
        {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}
      </aside>
    </section>
  </div>
</body>
</html>
