<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 64px;
    position: relative;
    background: linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  /* Soft rounded blob top-right */
  .blob-tr {
    position: absolute;
    top: -60px; right: -40px;
    width: 320px; height: 320px;
    border-radius: 60% 40% 50% 50%;
    background: var(--accent);
    opacity: 0.12;
    pointer-events: none;
  }

  /* Soft rounded blob bottom-left */
  .blob-bl {
    position: absolute;
    bottom: -80px; left: -50px;
    width: 260px; height: 260px;
    border-radius: 50% 60% 40% 55%;
    background: var(--accent2);
    opacity: 0.10;
    pointer-events: none;
  }



  .tag {
    display: inline-block;
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 18px;
    background: var(--tag-bg);
    padding: 6px 16px;
    border-radius: 20px;
    align-self: flex-start;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 56px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -1px;
    max-width: 90%;
    margin-bottom: 18px;
  }

  .divider {
    width: 48px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin-bottom: 18px;
    border-radius: 2px;
  }

  .subtext {
    font-size: 21px;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 85%;
    line-height: 1.55;
    margin-bottom: 32px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 14px;
    padding: 14px 32px;
    border-radius: 28px;
    letter-spacing: 1px;
  }

  .footer {
    position: absolute;
    bottom: 32px;
    left: 64px;
    right: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="blob-tr"></div>
    <div class="blob-bl"></div>

    <span class="tag">Family Tips</span>
    <h1 class="headline">{{headline}}</h1>
    <div class="divider"></div>
    {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
    {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}

    <div class="footer">
      {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
    </div>
  </div>
</body>
</html>
