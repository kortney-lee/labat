<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
    --panel-ink: rgba(255,255,255,0.08);
    --head-size: 60px;
    --sub-alpha: 0.7;
    --hero-shift: -16px;
    --shadow: 0 16px 48px rgba(0,0,0,0.35);
  }

  body[data-theme='light'] {
    --panel-ink: rgba(255,255,255,0.45);
    --sub-alpha: 0.84;
    --shadow: 0 10px 30px rgba(0,0,0,0.22);
  }

  body[data-theme='bold'] {
    --head-size: 66px;
    --hero-shift: -28px;
  }

  body[data-direction='data_lab'] {
    --head-size: 56px;
    --hero-shift: -8px;
  }

  body[data-direction='lifestyle'] {
    --head-size: 58px;
    --hero-shift: 0px;
  }

  .card {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 28px;
    padding: 62px 58px;
    position: relative;
    background:
      radial-gradient(circle at 82% 20%, var(--glow) 0%, transparent 45%),
      linear-gradient(136deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  .grid-noise {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    opacity: 0.5;
  }

  .left {
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 8px;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 900;
    font-size: var(--head-size);
    color: #f8fafc;
    line-height: 1.02;
    letter-spacing: -1.5px;
    transform: translateY(var(--hero-shift));
    margin-bottom: 12px;
    text-wrap: balance;
    text-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }

  .kicker {
    font-family: var(--font-headline);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(248,250,252,0.7);
    margin-bottom: 16px;
  }

  .subtext {
    font-size: 21px;
    font-weight: 400;
    color: rgba(248,250,252,var(--sub-alpha));
    max-width: 92%;
    line-height: 1.45;
    margin-bottom: 24px;
    text-wrap: pretty;
  }

  .right {
    z-index: 2;
    border: 1px solid rgba(255,255,255,0.1);
    background: linear-gradient(180deg, var(--panel-ink) 0%, rgba(0,0,0,0.18) 100%);
    backdrop-filter: blur(4px);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  .signal {
    font-size: 13px;
    color: rgba(248,250,252,0.78);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .bar {
    margin-top: 12px;
    height: 6px;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), rgba(255,255,255,0.12));
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 14px;
    padding: 14px 18px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
  }

  .footer {
    margin-top: 12px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 10px;
  }

  .logo {
    height: 56px;
    width: auto;
    object-fit: contain;
  }

  .product-name {
    font-size: 12px;
    font-weight: 700;
    color: rgba(248,250,252,0.54);
    letter-spacing: 1.1px;
    text-transform: uppercase;
  }
</style>
</head>
<body data-theme="{{theme}}" data-direction="{{artDirection}}">
  <div class="card">
    <div class="grid-noise"></div>

    <section class="left">
      <div class="kicker">Signal Alert</div>
      <h1 class="headline">{{headline}}</h1>
      {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
      <div class="footer">
        {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
        {{#if productName}}<span class="product-name">{{productName}}</span>{{/if}}
      </div>
    </section>

    <aside class="right">
      <div>
        <div class="signal">Evidence Mode</div>
        <div class="bar"></div>
      </div>
      {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}
    </aside>

    <div class="watermark">WIHY</div>
  </div>
</body>
</html>

  </div>
</body>
</html>
