<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{{{brandStyles}}}
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* Full-bleed background photo */
  .photo-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('{{photoUrl}}');
    background-size: cover;
    background-position: center;
  }

  /* Dark gradient overlay for text readability */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.3) 30%,
      rgba(0,0,0,0.75) 70%,
      rgba(0,0,0,0.9) 100%
    );
  }

  /* Accent bar at top */
  .top-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
    opacity: 0.8;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 64px;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 900;
    font-size: 52px;
    color: #ffffff;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    max-width: 90%;
  }

  .subtext {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
    max-width: 80%;
    margin-bottom: 32px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }

  .cta-btn {
    display: inline-flex;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 16px;
    padding: 14px 40px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .logo {
    position: absolute;
    top: 32px;
    right: 32px;
    height: 48px;
    width: auto;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
  <div class="card">
    <div class="photo-bg"></div>
    <div class="overlay"></div>
    <div class="top-accent"></div>

    <div class="content">
      <h1 class="headline">{{headline}}</h1>
      {{#if subtext}}<p class="subtext">{{subtext}}</p>{{/if}}
      {{#if cta}}<div class="cta-btn">{{cta}}</div>{{/if}}
    </div>

    {{#unless (eq showLogo false)}}<img class="logo" src="{{logoUrl}}" />{{/unless}}
  </div>
</body>
</html>
