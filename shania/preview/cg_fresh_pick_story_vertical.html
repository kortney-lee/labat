<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1920px;
        --bg1: #fffbeb;
        --bg2: #fef3c7;
        --accent: #b45309;
        --accent2: #166534;
        --text-primary: #78350f;
        --text-secondary: #6b7280;
        --tag-bg: rgba(180,83,9,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #b45309;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    background: var(--bg1);
    padding: 64px;
  }

  /* Decorative leaf shapes */
  .leaf-1 {
    position: absolute;
    top: 40px; right: 48px;
    width: 60px; height: 90px;
    border-radius: 0 60px 0 60px;
    background: var(--accent);
    opacity: 0.08;
    transform: rotate(20deg);
    pointer-events: none;
  }
  .leaf-2 {
    position: absolute;
    bottom: 100px; left: 48px;
    width: 40px; height: 60px;
    border-radius: 0 40px 0 40px;
    background: var(--accent2);
    opacity: 0.06;
    transform: rotate(-15deg);
    pointer-events: none;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 52px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.5px;
    max-width: 85%;
    margin-bottom: 16px;
  }

  .divider {
    width: 44px;
    height: 4px;
    background: var(--accent);
    margin-bottom: 16px;
    border-radius: 2px;
  }

  .subtext {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 85%;
    margin-bottom: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 12px 28px;
    border-radius: 24px;
    letter-spacing: 1px;
  }



  .footer {
    position: absolute;
    bottom: 28px;
    right: 64px;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="leaf-1"></div>
    <div class="leaf-2"></div>

    <h1 class="headline">This Week&#x27;s Fresh Pick: Sweet Potatoes</h1>
    <div class="divider"></div>
    <p class="subtext">Packed with vitamin A, fiber, and natural sweetness. Perfect for fall family dinners.</p>
    <div class="cta-btn">See Recipes</div>

    <div class="footer">
      <img class="logo" src="https://storage.googleapis.com/cg-web-assets/images/Logo_CG.png" />
    </div>
  </div>
</body>
</html>
