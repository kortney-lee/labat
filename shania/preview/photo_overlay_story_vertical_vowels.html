<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1920px;
        --bg1: #f8fafc;
        --bg2: #f1f5f9;
        --accent: #2563eb;
        --accent2: #8b5cf6;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --tag-bg: rgba(37,99,235,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #2563eb;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* Full-bleed background photo */
  .photo-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('https://images.unsplash.com/photo-1574943320219-553eb213f72d?w&#x3D;1080&amp;h&#x3D;1080&amp;fit&#x3D;crop');
    background-size: cover;
    background-position: center;
  }

  /* Dark gradient overlay for text readability */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.3) 30%,
      rgba(0,0,0,0.75) 70%,
      rgba(0,0,0,0.9) 100%
    );
  }

  /* Accent bar at top */
  .top-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
    opacity: 0.8;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 64px;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 900;
    font-size: 52px;
    color: #ffffff;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    max-width: 90%;
  }

  .subtext {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
    max-width: 80%;
    margin-bottom: 32px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }

  .cta-btn {
    display: inline-flex;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 16px;
    padding: 14px 40px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .logo {
    position: absolute;
    top: 32px;
    right: 32px;
    height: 48px;
    width: auto;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
  <div class="card">
    <div class="photo-bg"></div>
    <div class="overlay"></div>
    <div class="top-accent"></div>

    <div class="content">
      <h1 class="headline">Farm to Table Isn&#x27;t Just a Trend</h1>
      <p class="subtext">It&#x27;s how your grandparents ate every single day.</p>
      <div class="cta-btn">Learn Why It Matters</div>
    </div>

    <img class="logo" src="https://storage.googleapis.com/wihy-web-assets/images/brands/vowels_logo.png" />
  </div>
</body>
</html>
