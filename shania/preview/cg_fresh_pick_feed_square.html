<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1080px;
        --bg1: #fff7ed;
        --bg2: #fef2f2;
        --accent: #ea580c;
        --accent2: #16a34a;
        --text-primary: #7c2d12;
        --text-secondary: #6b7280;
        --tag-bg: rgba(234,88,12,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #ea580c;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    background: var(--bg1);
    padding: 64px;
  }

  /* Decorative leaf shapes */
  .leaf-1 {
    position: absolute;
    top: 40px; right: 48px;
    width: 60px; height: 90px;
    border-radius: 0 60px 0 60px;
    background: var(--accent);
    opacity: 0.08;
    transform: rotate(20deg);
    pointer-events: none;
  }
  .leaf-2 {
    position: absolute;
    bottom: 100px; left: 48px;
    width: 40px; height: 60px;
    border-radius: 0 40px 0 40px;
    background: var(--accent2);
    opacity: 0.06;
    transform: rotate(-15deg);
    pointer-events: none;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 52px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.5px;
    max-width: 85%;
    margin-bottom: 16px;
  }

  .divider {
    width: 44px;
    height: 4px;
    background: var(--accent);
    margin-bottom: 16px;
    border-radius: 2px;
  }

  .subtext {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 85%;
    margin-bottom: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 12px 28px;
    border-radius: 24px;
    letter-spacing: 1px;
  }



  .footer {
    position: absolute;
    bottom: 28px;
    right: 64px;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
  }

  /* Phone mockup floating right */
  .phone-mockup {
    position: absolute;
    right: 48px;
    bottom: 100px;
    width: 200px;
    height: 400px;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
    border: 6px solid rgba(255,255,255,0.85);
    background: #fff;
    transform: rotate(3deg);
    z-index: 2;
  }
  .phone-mockup img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Food photo circle */
  .food-photo {
    position: absolute;
    right: 180px;
    bottom: 160px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    border: 5px solid rgba(255,255,255,0.6);
    z-index: 1;
  }
  .food-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
