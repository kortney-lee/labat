<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1920px;
        --bg1: #fff7ed;
        --bg2: #fef2f2;
        --accent: #ea580c;
        --accent2: #16a34a;
        --text-primary: #7c2d12;
        --text-secondary: #6b7280;
        --tag-bg: rgba(234,88,12,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #ea580c;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: row;
    position: relative;
    background: var(--bg1);
  }

  /* Left color panel */
  .side-panel {
    width: 38%;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    position: relative;
    overflow: hidden;
  }

  /* Food photo in side panel */
  .side-photo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .side-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .side-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.0) 0%,
      rgba(0,0,0,0.20) 60%,
      rgba(0,0,0,0.55) 100%);
  }
  .side-panel > *:not(.side-photo) {
    position: relative;
    z-index: 1;
  }

  /* Phone mockup in content area */
  .content-phone {
    position: absolute;
    bottom: 80px;
    right: 56px;
    width: 100px;
    height: 200px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
    border: 3px solid rgba(0,0,0,0.06);
    background: #fff;
    transform: rotate(3deg);
    z-index: 3;
  }
  .content-phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Decorative leaf shape */
  .leaf {
    position: absolute;
    bottom: 40px; right: -30px;
    width: 80px; height: 120px;
    border-radius: 0 80px 0 80px;
    background: var(--bg1);
    opacity: 0.15;
    pointer-events: none;
  }

  .side-icon {
    width: 64px;
    height: 64px;
    position: relative;
    margin-bottom: 20px;
  }
  .side-icon::before,
  .side-icon::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 2px;
  }
  /* Fork */
  .side-icon::before {
    width: 4px;
    height: 36px;
    top: 14px;
    left: 20px;
    box-shadow:
      -8px -6px 0 0 rgba(255,255,255,0.85),
      0px -6px 0 0 rgba(255,255,255,0.85),
      8px -6px 0 0 rgba(255,255,255,0.85);
  }
  /* Knife */
  .side-icon::after {
    width: 6px;
    height: 42px;
    top: 8px;
    right: 18px;
    border-radius: 3px 3px 2px 2px;
  }

  .side-label {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 20px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: center;
    line-height: 1.3;
  }

  /* Right content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 56px;
    position: relative;
  }

  /* Subtle pattern of circles */
  .deco-circles {
    position: absolute;
    top: 40px; right: 40px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    pointer-events: none;
  }
  .deco-circles span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.12;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 48px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .divider {
    width: 40px;
    height: 4px;
    background: var(--accent);
    margin-bottom: 16px;
    border-radius: 2px;
  }

  .subtext {
    font-size: 19px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 12px 28px;
    border-radius: 24px;
    letter-spacing: 1px;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    right: 56px;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
