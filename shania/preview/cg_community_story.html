<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1920px;
        --bg1: #fffbeb;
        --bg2: #fefce8;
        --accent: #ca8a04;
        --accent2: #15803d;
        --text-primary: #713f12;
        --text-secondary: #78716c;
        --tag-bg: rgba(202,138,4,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #ca8a04;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    padding: 44px;
    position: relative;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(255,255,255,0.5) 0%, transparent 50%),
      linear-gradient(155deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  /* Soft organic blobs */
  .blob-a {
    position: absolute;
    width: 380px;
    height: 300px;
    left: -100px;
    top: -80px;
    border-radius: 62% 38% 46% 54% / 50% 58% 42% 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0.10;
    pointer-events: none;
  }

  .blob-b {
    position: absolute;
    width: 240px;
    height: 240px;
    right: -60px;
    bottom: -70px;
    border-radius: 50% 50% 42% 58% / 58% 42% 56% 44%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    opacity: 0.08;
    pointer-events: none;
  }

  .panel {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow:
      0 24px 48px rgba(0,0,0,0.10),
      0 1px 3px rgba(0,0,0,0.06);
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    overflow: hidden;
  }

  /* ── Left column ── */
  .left {
    padding: 44px 40px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .community-tag {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    font-family: var(--font-headline);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.06);
  }

  .community-tag::before {
    content: '';
    display: block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .content-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 0;
  }

  .headline {
    font-family: var(--font-headline);
    font-size: 46px;
    font-weight: 900;
    line-height: 1.08;
    letter-spacing: -0.8px;
    color: var(--text-primary);
    text-wrap: balance;
    margin-bottom: 14px;
  }

  .divider {
    width: 40px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin-bottom: 14px;
  }

  .subtext {
    font-size: 19px;
    line-height: 1.55;
    color: var(--text-secondary);
    text-wrap: pretty;
    max-width: 95%;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    height: 68px;
    width: auto;
    object-fit: contain;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: var(--btn-bg, var(--accent));
    color: var(--btn-text, #fff);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    border-radius: 999px;
    padding: 11px 22px;
  }

  /* ── Right column ── */
  .right {
    position: relative;
    background: linear-gradient(160deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 32px;
    color: #fff;
    overflow: hidden;
  }

  /* Overlapping avatar circles — community togetherness */
  .circle-cluster {
    position: absolute;
    top: 24px;
    right: 24px;
    display: flex;
    align-items: center;
  }

  .circle-dot {
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.50);
  }
  .circle-dot:nth-child(1) { width: 34px; height: 34px; background: rgba(255,255,255,0.22); }
  .circle-dot:nth-child(2) { width: 30px; height: 30px; margin-left: -9px; background: rgba(255,255,255,0.16); }
  .circle-dot:nth-child(3) { width: 36px; height: 36px; margin-left: -11px; background: rgba(255,255,255,0.26); }
  .circle-dot:nth-child(4) { width: 28px; height: 28px; margin-left: -8px; background: rgba(255,255,255,0.13); }
  .circle-dot:nth-child(5) { width: 32px; height: 32px; margin-left: -10px; background: rgba(255,255,255,0.19); }

  .member-count {
    margin-left: 8px;
    font-family: var(--font-headline);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.50);
  }

  /* Large decorative ring */
  .deco-ring {
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 180px;
    height: 180px;
    border: 2px solid rgba(255,255,255,0.10);
    border-radius: 50%;
    pointer-events: none;
  }

  .deco-ring-sm {
    position: absolute;
    top: 80px;
    right: -30px;
    width: 100px;
    height: 100px;
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 50%;
    pointer-events: none;
  }

  .quote-mark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 100px;
    line-height: 0.75;
    opacity: 0.25;
    margin-bottom: 4px;
  }

  .quote-text {
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 24px;
    line-height: 1.35;
    color: rgba(255,255,255,0.92);
    margin-bottom: 20px;
    text-wrap: pretty;
  }

  .quote-rule {
    width: 32px;
    height: 2px;
    background: rgba(255,255,255,0.35);
    border-radius: 1px;
    margin-bottom: 14px;
  }

  .quote-attr {
    font-family: var(--font-headline);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }

  /* ── Story / portrait responsive ── */
  @media (max-aspect-ratio: 3/4) {
    .card { padding: 36px; }

    .panel {
      grid-template-columns: 1fr;
      grid-template-rows: 1.2fr 1fr;
    }

    .left {
      padding: 40px 36px 28px;
    }

    .headline {
      font-size: 52px;
    }

    .subtext {
      font-size: 22px;
    }

    .right {
      padding: 32px 36px 36px;
    }

    .circle-cluster {
      top: auto;
      bottom: 32px;
      right: 32px;
    }

    .deco-ring {
      bottom: -30px;
      left: auto;
      right: -30px;
      width: 140px;
      height: 140px;
    }

    .deco-ring-sm { display: none; }

    .quote-text {
      font-size: 26px;
    }

    .quote-mark {
      font-size: 80px;
    }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="blob-a"></div>
    <div class="blob-b"></div>
    <section class="panel">
      <div class="left">
        <span class="community-tag">Community</span>
        <div class="content-block">
          <h1 class="headline">Dinner Does Not Have to Be Complicated</h1>
          <div class="divider"></div>
          <p class="subtext">5 ingredients. 20 minutes. A meal your whole family will love.</p>
        </div>
        <div class="footer">
          <img class="logo" src="https://storage.googleapis.com/cg-web-assets/images/Logo_CG.png" />
          <div class="cta-btn">Get the Recipe</div>
        </div>
      </div>
      <aside class="right">
        <div class="circle-cluster">
          <div class="circle-dot"></div>
          <div class="circle-dot"></div>
          <div class="circle-dot"></div>
          <div class="circle-dot"></div>
          <div class="circle-dot"></div>
          <span class="member-count">12k+</span>
        </div>
        <div class="deco-ring"></div>
        <div class="deco-ring-sm"></div>
        <div class="quote-mark">&ldquo;</div>
        <div class="quote-text">We started meal prepping together and saved over $200 a month. It changed everything for our family.</div>
        <div class="quote-rule"></div>
        <div class="quote-attr">Sarah M., Community Member</div>
      </aside>
    </section>
  </div>
</body>
</html>
