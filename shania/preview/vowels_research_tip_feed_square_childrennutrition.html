<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1080px;
        --bg1: #f8fafc;
        --bg2: #f1f5f9;
        --accent: #2563eb;
        --accent2: #8b5cf6;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --tag-bg: rgba(37,99,235,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #2563eb;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: row;
    position: relative;
    background: var(--bg1);
  }

  /* Left accent panel — flat, no gradient */
  .side-panel {
    width: 36%;
    background: var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    position: relative;
  }

  .side-icon {
    width: 64px;
    height: 52px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 20px;
  }
  .side-icon .bar {
    flex: 1;
    background: rgba(255,255,255,0.85);
    border-radius: 3px 3px 0 0;
  }
  .side-icon .bar:nth-child(1) { height: 40%; }
  .side-icon .bar:nth-child(2) { height: 70%; }
  .side-icon .bar:nth-child(3) { height: 55%; }
  .side-icon .bar:nth-child(4) { height: 100%; }
  .side-icon .bar:nth-child(5) { height: 80%; }

  .side-label {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 18px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: center;
    line-height: 1.3;
  }

  /* Right content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 56px;
    position: relative;
  }

  /* Subtle dot grid */
  .deco-dots {
    position: absolute;
    top: 40px; right: 40px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    pointer-events: none;
  }
  .deco-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.10;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 46px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .rule {
    width: 40px;
    height: 3px;
    background: var(--accent);
    margin-bottom: 16px;
  }

  .subtext {
    font-size: 19px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 12px 28px;
    border-radius: 6px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    right: 56px;
  }

  .logo {
    height: 80px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="side-panel">
      <div class="side-icon">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="side-label">Data<br>Insight</div>
    </div>

    <div class="content">
      <div class="deco-dots">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>

      <h1 class="headline">Food Subsidies Favor Junk Over Produce</h1>
      <div class="rule"></div>
      <p class="subtext">$19B in annual subsidies go to corn and soy — staples of ultra-processed food manufacturing.</p>
      <div class="cta-btn">See the Breakdown</div>

      <div class="footer">
        <img class="logo" src="https://storage.googleapis.com/wihy-web-assets/images/brands/vowels_logo.png" />
      </div>
    </div>
  </div>
</body>
</html>
