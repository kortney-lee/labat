<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1080px;
        --bg1: #ecfdf5;
        --bg2: #fef9c3;
        --accent: #16a34a;
        --accent2: #ea580c;
        --text-primary: #14532d;
        --text-secondary: #6b7280;
        --tag-bg: rgba(22,163,74,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #16a34a;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 72px;
    position: relative;
    background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
    opacity: 0.6;
  }

  /* Corner glow */
  .glow {
    position: absolute;
    bottom: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Decorative bracket lines */
  .deco-bracket-l, .deco-bracket-r {
    position: absolute;
    width: 3px;
    height: 200px;
    background: var(--accent);
    opacity: 0.08;
    pointer-events: none;
  }
  .deco-bracket-l { left: 48px; top: 50%; transform: translateY(-50%); }
  .deco-bracket-r { right: 48px; top: 50%; transform: translateY(-50%); }

  .quote-mark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 140px;
    color: var(--accent);
    line-height: 0.8;
    opacity: 0.2;
    margin-bottom: -8px;
  }

  .quote-text {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 46px;
    color: #f8fafc;
    line-height: 1.25;
    max-width: 85%;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: -0.5px;
  }

  .accent-line {
    width: 48px;
    height: 3px;
    background: var(--accent);
    margin-bottom: 24px;
    border-radius: 2px;
  }

  .attribution {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .subtext {
    font-size: 18px;
    font-weight: 400;
    color: rgba(248,250,252,0.4);
    max-width: 70%;
    text-align: center;
    line-height: 1.5;
  }

  .logo {
    position: absolute;
    bottom: 32px;
    height: 56px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="deco-bracket-l"></div>
    <div class="deco-bracket-r"></div>

    <div class="quote-mark">&ldquo;</div>

    <div class="quote-text">We didn&#x27;t lose our health — we replaced it with convenience.</div>

    <div class="accent-line"></div>

    <div class="attribution">WIHY Research Team</div>

    <p class="subtext">10 years of data. 48 million research articles. One conclusion.</p>

    <img class="logo" src="https://storage.googleapis.com/cg-web-assets/images/Logo_CG.png" />
  </div>
</body>
</html>
