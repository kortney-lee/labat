<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1080px;
        --bg1: #fefce8;
        --bg2: #f0fdf4;
        --accent: #166534;
        --accent2: #f97316;
        --text-primary: #14532d;
        --text-secondary: #4b5563;
        --tag-bg: rgba(22,101,52,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #166534;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 64px;
    position: relative;
    background: linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 100%);
  }

  /* Soft rounded blob top-right */
  .blob-tr {
    position: absolute;
    top: -60px; right: -40px;
    width: 320px; height: 320px;
    border-radius: 60% 40% 50% 50%;
    background: var(--accent);
    opacity: 0.12;
    pointer-events: none;
  }

  /* Soft rounded blob bottom-left */
  .blob-bl {
    position: absolute;
    bottom: -80px; left: -50px;
    width: 260px; height: 260px;
    border-radius: 50% 60% 40% 55%;
    background: var(--accent2);
    opacity: 0.10;
    pointer-events: none;
  }



  .tag {
    display: inline-block;
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 18px;
    background: var(--tag-bg);
    padding: 6px 16px;
    border-radius: 20px;
    align-self: flex-start;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 56px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -1px;
    max-width: 65%;
    margin-bottom: 18px;
  }

  .divider {
    width: 48px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin-bottom: 18px;
    border-radius: 2px;
  }

  .subtext {
    font-size: 21px;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 60%;
    line-height: 1.55;
    margin-bottom: 32px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 14px;
    padding: 14px 32px;
    border-radius: 28px;
    letter-spacing: 1px;
  }

  .footer {
    position: absolute;
    bottom: 32px;
    left: 64px;
    right: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    height: 96px;
    width: auto;
    object-fit: contain;
  }

  /* Phone mockup floating right */
  .phone-mockup {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%) rotate(-2deg);
    width: 210px;
    height: 420px;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
    border: 6px solid rgba(255,255,255,0.85);
    background: #fff;
    z-index: 2;
  }
  .phone-mockup img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Food photo rounded */
  .food-photo {
    position: absolute;
    right: 200px;
    top: 50%;
    transform: translateY(-50%) rotate(2deg);
    width: 240px;
    height: 240px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 14px 40px rgba(0,0,0,0.12);
    border: 5px solid rgba(255,255,255,0.5);
    z-index: 1;
  }
  .food-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
