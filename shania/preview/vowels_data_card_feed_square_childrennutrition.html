<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');
      :root {
        --font-headline: 'Montserrat', sans-serif;
        --font-body: 'Inter', sans-serif;
        --canvas-w: 1080px;
        --canvas-h: 1080px;
        --bg1: #fefce8;
        --bg2: #faf5ff;
        --accent: #7c3aed;
        --accent2: #2563eb;
        --text-primary: #1e1b4b;
        --text-secondary: #78716c;
        --tag-bg: rgba(124,58,237,0.08);
        --glow: rgba(0,0,0,0);
        --btn-bg: #7c3aed;
        --btn-text: #ffffff;
      }
    </style>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: var(--canvas-w);
    height: var(--canvas-h);
    font-family: var(--font-body);
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 64px;
    position: relative;
    background: var(--bg1);
  }

  /* Thin top accent bar */
  .accent-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--accent);
  }

  /* Subtle corner mark */
  .corner-mark {
    position: absolute;
    bottom: 40px; right: 40px;
    width: 80px; height: 80px;
    border-right: 3px solid var(--accent);
    border-bottom: 3px solid var(--accent);
    opacity: 0.12;
    pointer-events: none;
  }

  .tag {
    display: inline-block;
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 20px;
    background: var(--tag-bg);
    padding: 6px 16px;
    border-radius: 4px;
    align-self: flex-start;
  }

  .headline {
    font-family: var(--font-headline);
    font-weight: 800;
    font-size: 54px;
    color: var(--text-primary);
    line-height: 1.1;
    letter-spacing: -1px;
    max-width: 90%;
    margin-bottom: 20px;
  }

  .rule {
    width: 56px;
    height: 3px;
    background: var(--accent);
    margin-bottom: 20px;
  }

  .subtext {
    font-size: 21px;
    font-weight: 400;
    color: var(--text-secondary);
    max-width: 85%;
    line-height: 1.55;
    margin-bottom: 32px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 13px;
    padding: 14px 32px;
    border-radius: 6px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .footer {
    position: absolute;
    bottom: 32px;
    left: 64px;
    right: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    height: 80px;
    width: auto;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="corner-mark"></div>

    <span class="tag">Research Insight</span>
    <h1 class="headline">73% of School Lunches Exceed Sugar Limits</h1>
    <div class="rule"></div>
    <p class="subtext">New USDA data reveals a widening gap between nutrition guidelines and cafeteria reality.</p>
    <div class="cta-btn">See the Data</div>

    <div class="footer">
      <img class="logo" src="https://storage.googleapis.com/wihy-web-assets/images/brands/vowels_logo.png" />
    </div>
  </div>
</body>
</html>
